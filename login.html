<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- Content Security Policy -->

    <script src="js/analytics.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | ChequeFlex</title>
    <!-- Anti-clickjacking + frame-busting -->
    <script src="js/boot-lite.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy-blue:    #081628;
            --navy-mid:     #0D1F3C;
            --navy-light:   #1A3358;
            --royal-gold:   #2B62F0;          /* Electric Blue */
            --gold-light:   #4A7FE8;          /* Lighter blue */
            --text-main:    #E8EEF8;
            --text-muted:   #7A9AC0;
            --border-color: rgba(74, 127, 232, 0.15);
            --danger:   #EF4444;
            --success:  #0EA875;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--navy-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(29,80,216,0.09) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(8,22,40,0.8) 0%, transparent 60%);
        }

        .login-card {
            background: var(--navy-mid);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .brand-name {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .login-logo .brand-name span { color: var(--royal-gold); }

        .login-logo .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .gold-bar {
            width: 48px;
            height: 4px;
            background: linear-gradient(90deg, var(--royal-gold), var(--gold-light));
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 16px;
            background: var(--navy-blue);
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--royal-gold);
            box-shadow: 0 0 0 3px rgba(29,80,216,0.18);
        }

        .input-group input.invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
        }

        .error-msg {
            font-size: 0.8rem;
            color: var(--danger);
            font-weight: 600;
            margin-top: 6px;
            display: none;
        }

        .global-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.875rem;
            color: #FCA5A5;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--royal-gold), var(--gold-light));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29,80,216,0.40);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(15,23,42,0.3);
            border-top-color: var(--navy-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link a:hover { color: var(--royal-gold); }

        .lock-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .lock-icon svg { color: var(--royal-gold); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="lock-icon">
            <svg width="64" height="64" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M30 10C26.8 6.5 22.2 4 17 4C8.7 4 2 10.7 2 19C2 27.3 8.7 34 17 34C22.2 34 26.8 31.5 30 28" stroke="url(#cfC_lgn)" stroke-width="4.2" stroke-linecap="round"/>
                <path d="M10 19L15.5 24.5L25 13" stroke="url(#cfK_lgn)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="cfC_lgn" x1="2" y1="4" x2="30" y2="34" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#4A7FE8"/>
                        <stop offset="100%" stop-color="#1D50D8"/>
                    </linearGradient>
                    <linearGradient id="cfK_lgn" x1="10" y1="13" x2="25" y2="24.5" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#C5D0E4"/>
                        <stop offset="100%" stop-color="#E8EEF8"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="login-logo">
            <div class="brand-name">Cheque<span>Flex</span></div>
            <div class="subtitle">حاسبة الشيكات الذكية</div>
            <div class="gold-bar"></div>
        </div>

        <div class="global-error" id="globalError">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>

        <div class="input-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" inputmode="email">
            <div class="error-msg" id="error-email">يرجى إدخال البريد الإلكتروني</div>
        </div>

        <div class="input-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
            <div class="error-msg" id="error-password">يرجى إدخال كلمة المرور</div>
        </div>

        <button type="button" class="btn-login" id="loginBtn">
            <div class="spinner" id="spinner"></div>
            <span id="loginBtnText">تسجيل الدخول</span>
        </button>

        <div class="back-link">
            <a href="index.html">← العودة للأداة الرئيسية</a>
        </div>

        <!-- Copyright -->
        <div style="
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.8;
            opacity: 0.8;
        ">
            <div>جميع الحقوق محفوظة &copy; 2026</div>
            <div style="font-size:0.72rem; opacity:0.75;">developed by <span style="color:var(--text-main);font-weight:700;">Mohamed Sayed</span></div>
        </div>
    </div>

    <!-- Supabase library (local, vendored) + login logic -->
    <script src="js/vendor/supabase.min.js"></script>
    <script type="module" src="js/login.js"></script>
