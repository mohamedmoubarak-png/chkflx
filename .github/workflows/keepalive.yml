name: Supabase Keep-Alive

# يمنع توقّف مشروع Supabase المجاني بعد 7 أيام من عدم النشاط.
# يرسل طلب قراءة بسيط لقاعدة البيانات كل 3 أيام (هامش أمان قبل حد الـ 7 أيام).

on:
  schedule:
    # 06:00 UTC كل 3 أيام
    - cron: "0 6 */3 * *"
  workflow_dispatch:   # يسمح بالتشغيل اليدوي من تبويب Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          echo "Pinging Supabase to keep the project active..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=code&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Supabase is awake."
          else
            echo "✗ Unexpected status code: $HTTP_CODE"
            exit 1
          fi
